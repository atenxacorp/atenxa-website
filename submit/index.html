<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Your Video — Atenxa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#070709;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
}

.container{
  width:100%;
  max-width:720px;
  background:#111114;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:28px;
  padding:42px;
}

.logo{
  font-size:32px;
  font-weight:800;
  margin-bottom:14px;
}

.logo span{
  color:#7dd3fc;
}

.badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(125,211,252,0.10);
  border:1px solid rgba(125,211,252,0.20);
  color:#7dd3fc;
  font-size:12px;
  margin-bottom:24px;
}

h1{
  font-size:52px;
  line-height:0.95;
  margin-bottom:18px;
}

.sub{
  color:#9ca3af;
  line-height:1.8;
  margin-bottom:40px;
}

.form-group{
  margin-bottom:22px;
}

label{
  display:block;
  margin-bottom:10px;
  font-size:14px;
  color:#d1d5db;
}

input,
select,
textarea{
  width:100%;
  background:#18181c;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:16px;
  color:white;
  font-size:15px;
  outline:none;
}

input:focus,
select:focus,
textarea:focus{
  border-color:rgba(125,211,252,0.35);
}

.upload-box{
  border:2px dashed rgba(125,211,252,0.25);
  border-radius:20px;
  padding:38px;
  text-align:center;
  background:rgba(125,211,252,0.03);
}

.upload-box p{
  color:#9ca3af;
  margin-top:12px;
  font-size:14px;
}

button{
  width:100%;
  border:none;
  background:#7dd3fc;
  color:#050505;
  font-size:16px;
  font-weight:700;
  padding:18px;
  border-radius:16px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.note{
  margin-top:18px;
  text-align:center;
  color:#6b7280;
  font-size:13px;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">Aten<span>xa</span></div>

<div class="badge">
Attention Intelligence Submission
</div>

<h1>
Submit Your<br>Video
</h1>

<p class="sub">
Upload your TikTok, Reel, or YouTube Short and receive a behavioral attention analysis before you publish.
</p>

<form>

<div class="form-group">
<label>Your Email</label>
<input type="email" placeholder="you@example.com">
</div>

<div class="form-group">
<label>Platform</label>
<select>
<option>TikTok</option>
<option>YouTube Shorts</option>
<option>Instagram Reels</option>
</select>
</div>

<div class="form-group">
<label>Video Upload</label>

<div class="upload-box">
<input type="file">
<p>
Upload MP4, MOV, or paste a private drive link.
</p>
</div>

</div>

<div class="form-group">
<label>Anything we should know?</label>
<textarea rows="5" placeholder="Target audience, niche, goals, retention concerns..."></textarea>
</div>

<button type="submit">
Analyze My Video →
</button>

</form>

<div class="note">
First analysis free • Report delivered within 24 hours
</div>

</div>

</body>
</html>
